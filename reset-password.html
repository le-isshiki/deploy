<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — SwitchCash</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a1a15;color:#c8e6e0;min-height:100vh;display:flex;flex-direction:column}
  a{color:#00c9b1;text-decoration:none}
  .nav{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid rgba(255,255,255,.06)}
  .logo{font-size:18px;font-weight:700;color:#00c9b1}
  .main{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 16px}
  .card{background:#0f2419;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:36px 32px;width:100%;max-width:420px}
  .icon{width:48px;height:48px;background:rgba(0,201,177,.12);border:1px solid rgba(0,201,177,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
  h1{text-align:center;font-size:22px;font-weight:700;color:#fff;margin-bottom:8px}
  .sub{text-align:center;font-size:14px;color:#6b9e96;margin-bottom:28px}
  label{display:block;font-size:13px;font-weight:500;color:#9ecfc8;margin-bottom:6px}
  .field{margin-bottom:16px;position:relative}
  input[type=password]{width:100%;padding:11px 42px 11px 14px;background:#0a1a15;border:1px solid rgba(255,255,255,.12);border-radius:10px;color:#fff;font-size:15px;outline:none;transition:border-color .2s}
  input[type=password]:focus{border-color:#00c9b1}
  .toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#6b9e96;padding:4px}
  .hint{font-size:12px;color:#3a6058;margin-top:6px}
  .strength{height:3px;border-radius:99px;margin-top:8px;transition:all .3s;background:#1a3328}
  .btn{width:100%;padding:13px;background:#00c9b1;color:#0a1a15;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;transition:opacity .2s}
  .btn:hover{opacity:.9}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .msg{margin-top:16px;padding:12px 14px;border-radius:10px;font-size:14px;line-height:1.5;display:none}
  .msg.success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);color:#4ade80}
  .msg.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#f87171}
  .invalid-token{text-align:center;padding:20px;display:none}
  .back{text-align:center;margin-top:20px;font-size:14px;color:#6b9e96}
  .footer{text-align:center;padding:20px;font-size:12px;color:#3a6058;border-top:1px solid rgba(255,255,255,.05)}
</style>
</head>
<body>
<nav class="nav">
  <a class="logo" href="/">SwitchCash</a>
</nav>
<main class="main">
  <div class="card">
    <div class="invalid-token" id="invalid">
      <div style="font-size:32px;margin-bottom:12px">⚠️</div>
      <h1 style="color:#f87171;margin-bottom:8px">Link expired</h1>
      <p style="color:#6b9e96;font-size:14px;margin-bottom:20px">This reset link has expired or is invalid. Reset links are valid for 15 minutes.</p>
      <a href="/forgot-password" style="display:inline-block;background:#00c9b1;color:#0a1a15;padding:11px 24px;border-radius:10px;font-weight:700;font-size:14px">Request new link</a>
    </div>
    <div id="form-wrap">
      <div class="icon">
        <svg width="22" height="22" fill="none" stroke="#00c9b1" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <h1>Set new password</h1>
      <p class="sub">Choose a strong password for your account.</p>
      <form id="form" onsubmit="doReset(event)">
        <div class="field">
          <label for="pw">New password</label>
          <input type="password" id="pw" placeholder="Min. 8 characters" required oninput="checkStrength(this.value)">
          <button type="button" class="toggle" onclick="toggleVis('pw',this)">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
          <div class="strength" id="strength"></div>
          <div class="hint" id="hint"></div>
        </div>
        <div class="field">
          <label for="pw2">Confirm password</label>
          <input type="password" id="pw2" placeholder="Repeat your password" required>
          <button type="button" class="toggle" onclick="toggleVis('pw2',this)">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <button class="btn" id="btn" type="submit">Reset password</button>
      </form>
      <div class="msg" id="msg"></div>
      <div class="back"><a href="/login">← Back to Sign In</a></div>
    </div>
  </div>
</main>
<footer class="footer">© 2026 SwitchCash. All rights reserved.</footer>
<script>
const token = new URLSearchParams(location.search).get('token');
if (!token) {
  document.getElementById('form-wrap').style.display = 'none';
  document.getElementById('invalid').style.display = 'block';
}

function checkStrength(v) {
  const s = document.getElementById('strength');
  const h = document.getElementById('hint');
  if (!v) { s.style.background='#1a3328'; h.textContent=''; return; }
  let score = 0;
  if (v.length >= 8) score++;
  if (v.length >= 12) score++;
  if (/[A-Z]/.test(v)) score++;
  if (/[0-9]/.test(v)) score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;
  const colors = ['#ef4444','#f59e0b','#f59e0b','#22c55e','#22c55e'];
  const labels = ['Too short','Weak','Fair','Good','Strong'];
  s.style.background = colors[score-1] || '#1a3328';
  s.style.width = (score * 20) + '%';
  h.textContent = labels[score-1] || '';
  h.style.color = colors[score-1] || '#3a6058';
}

function toggleVis(id, btn) {
  const input = document.getElementById(id);
  input.type = input.type === 'password' ? 'text' : 'password';
}

async function doReset(e) {
  e.preventDefault();
  const pw  = document.getElementById('pw').value;
  const pw2 = document.getElementById('pw2').value;
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');
  msg.style.display = 'none';
  if (pw !== pw2) {
    msg.className='msg error'; msg.textContent='Passwords do not match.'; msg.style.display='block'; return;
  }
  if (pw.length < 8) {
    msg.className='msg error'; msg.textContent='Password must be at least 8 characters.'; msg.style.display='block'; return;
  }
  btn.disabled = true; btn.textContent = 'Resetting…';
  try {
    const r = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ token, password: pw }),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Reset failed');
    msg.className='msg success';
    msg.innerHTML = d.message + ' <a href="/login" style="color:#4ade80;font-weight:600">Sign in now →</a>';
    msg.style.display='block';
    document.getElementById('form').style.display='none';
  } catch(err) {
    msg.className='msg error'; msg.textContent=err.message; msg.style.display='block';
    if (err.message.includes('expired') || err.message.includes('Invalid')) {
      document.getElementById('form-wrap').style.display='none';
      document.getElementById('invalid').style.display='block';
    }
    btn.disabled=false; btn.textContent='Reset password';
  }
}
</script>
</body>
</html>
