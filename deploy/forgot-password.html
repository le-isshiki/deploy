<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — SwitchCash</title>
<meta name="description" content="Reset your SwitchCash password.">
<meta property="og:title" content="Forgot Password — SwitchCash">
<meta property="og:description" content="Reset your SwitchCash account password.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://switchcash.net/forgot-password">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a1a15;color:#c8e6e0;min-height:100vh;display:flex;flex-direction:column}
  a{color:#00c9b1;text-decoration:none}
  a:hover{text-decoration:underline}
  .nav{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid rgba(255,255,255,.06)}
  .logo{font-size:18px;font-weight:700;color:#00c9b1}
  .main{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 16px}
  .card{background:#0f2419;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:36px 32px;width:100%;max-width:420px}
  .icon{width:48px;height:48px;background:rgba(0,201,177,.12);border:1px solid rgba(0,201,177,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
  h1{text-align:center;font-size:22px;font-weight:700;color:#fff;margin-bottom:8px}
  .sub{text-align:center;font-size:14px;color:#6b9e96;line-height:1.6;margin-bottom:28px}
  label{display:block;font-size:13px;font-weight:500;color:#9ecfc8;margin-bottom:6px}
  input{width:100%;padding:11px 14px;background:#0a1a15;border:1px solid rgba(255,255,255,.12);border-radius:10px;color:#fff;font-size:15px;outline:none;transition:border-color .2s}
  input:focus{border-color:#00c9b1}
  .btn{width:100%;padding:13px;background:#00c9b1;color:#0a1a15;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:20px;transition:opacity .2s}
  .btn:hover{opacity:.9}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .msg{margin-top:16px;padding:12px 14px;border-radius:10px;font-size:14px;line-height:1.5;display:none}
  .msg.success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);color:#4ade80}
  .msg.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#f87171}
  .back{text-align:center;margin-top:20px;font-size:14px;color:#6b9e96}
  .footer{text-align:center;padding:20px;font-size:12px;color:#3a6058;border-top:1px solid rgba(255,255,255,.05)}
</style>
</head>
<body>
<nav class="nav">
  <a class="logo" href="/">SwitchCash</a>
  <a href="/login" style="font-size:14px;color:#9ecfc8">Sign In</a>
</nav>
<main class="main">
  <div class="card">
    <div class="icon">
      <svg width="22" height="22" fill="none" stroke="#00c9b1" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h1>Forgot your password?</h1>
    <p class="sub">Enter your email and we'll send you a link to reset your password. The link expires in 15 minutes.</p>
    <form id="form" onsubmit="submit(event)">
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
      <button class="btn" id="btn" type="submit">Send reset link</button>
    </form>
    <div class="msg" id="msg"></div>
    <div class="back"><a href="/login">← Back to Sign In</a></div>
  </div>
</main>
<footer class="footer">© 2026 SwitchCash. All rights reserved.</footer>
<script>
async function submit(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const btn   = document.getElementById('btn');
  const msg   = document.getElementById('msg');
  msg.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Sending…';
  try {
    const r = await fetch('/api/auth/forgot-password', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email }),
    });
    const d = await r.json();
    msg.className = 'msg success';
    msg.textContent = d.message || 'If this email exists, a reset link has been sent.';
    msg.style.display = 'block';
    document.getElementById('form').style.display = 'none';
  } catch {
    msg.className = 'msg error';
    msg.textContent = 'Something went wrong. Please try again.';
    msg.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Send reset link';
  }
}
</script>
</body>
</html>
