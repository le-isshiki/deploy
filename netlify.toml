[build]
  publish   = "."
  functions = "netlify/functions"
  command   = "npm install"

[functions]
  node_bundler = "esbuild"

# ── Block sensitive files ─────────────────────────────────────
[[redirects]]
  from   = "/*.sql"
  to     = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/.env*"
  to     = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/package*.json"
  to     = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/netlify/functions/*"
  to     = "/404.html"
  status = 404
  force  = true

# ── API routing ───────────────────────────────────────────────
[[redirects]]
  from   = "/api/admin/*"
  to     = "/.netlify/functions/admin"
  status = 200

[[redirects]]
  from   = "/api/auth/*"
  to     = "/.netlify/functions/auth"
  status = 200

[[redirects]]
  from   = "/api/user"
  to     = "/.netlify/functions/user"
  status = 200

[[redirects]]
  from   = "/api/user/*"
  to     = "/.netlify/functions/user"
  status = 200

[[redirects]]
  from   = "/api/wallet"
  to     = "/.netlify/functions/wallet"
  status = 200

[[redirects]]
  from   = "/api/wallet/*"
  to     = "/.netlify/functions/wallet"
  status = 200

[[redirects]]
  from   = "/api/transactions"
  to     = "/.netlify/functions/transactions"
  status = 200

[[redirects]]
  from   = "/api/analytics"
  to     = "/.netlify/functions/analytics"
  status = 200

[[redirects]]
  from   = "/api/disputes"
  to     = "/.netlify/functions/disputes"
  status = 200

[[redirects]]
  from   = "/api/disputes/*"
  to     = "/.netlify/functions/disputes"
  status = 200

[[redirects]]
  from   = "/api/transfers"
  to     = "/.netlify/functions/transfers"
  status = 200

[[redirects]]
  from   = "/api/transfers/*"
  to     = "/.netlify/functions/transfers"
  status = 200

[[redirects]]
  from   = "/api/kyc"
  to     = "/.netlify/functions/kyc"
  status = 200

[[redirects]]
  from   = "/api/kyc/*"
  to     = "/.netlify/functions/kyc"
  status = 200

[[redirects]]
  from   = "/api/agent"
  to     = "/.netlify/functions/agent"
  status = 200

[[redirects]]
  from   = "/api/agent/*"
  to     = "/.netlify/functions/agent"
  status = 200

[[redirects]]
  from   = "/api/migrate"
  to     = "/.netlify/functions/migrate"
  status = 200

[[redirects]]
  from   = "/api/dbfix"
  to     = "/.netlify/functions/dbfix"
  status = 200

# ── Clean URL redirects ──────────────────────────────────────
[[redirects]]
  from   = "/login"
  to     = "/login.html"
  status = 200

[[redirects]]
  from   = "/signup"
  to     = "/signup.html"
  status = 200

[[redirects]]
  from   = "/dashboard"
  to     = "/dashboard.html"
  status = 200

[[redirects]]
  from   = "/admin"
  to     = "/admin.html"
  status = 200

[[redirects]]
  from   = "/agent"
  to     = "/agent.html"
  status = 200

  [[redirects]]
  from = "/api/dbfix"
  to   = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from = "/api/migrate"
  to   = "/404.html"
  status = 404
  force  = true

# ── 404 fallback ─────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404
