<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Page Not Found — SwitchCash</title>
<link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#0e1512;--teal:#00c9b1;--teal-pale:rgba(0,201,177,.08);--border:rgba(0,201,177,.16);--border2:rgba(255,255,255,.08);--text:#d8ede9;--muted:#7aada7;--white:#fff;--card:rgba(18,32,28,.95);--r2:20px;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Instrument Sans',sans-serif;background:var(--ink);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:repeating-linear-gradient(-45deg,transparent,transparent 24px,rgba(255,255,255,.018) 24px,rgba(255,255,255,.018) 25px)}
.wrap{position:relative;z-index:1;max-width:420px}
.num{font-family:'Familjen Grotesk',sans-serif;font-size:7rem;font-weight:700;color:var(--teal);line-height:1;opacity:.15;margin-bottom:-1rem}
h1{font-family:'Familjen Grotesk',sans-serif;font-size:1.75rem;font-weight:700;color:var(--white);margin-bottom:.75rem}
p{font-size:.95rem;color:var(--muted);line-height:1.6;margin-bottom:2rem}
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.78rem 1.75rem;background:var(--teal);color:var(--ink);text-decoration:none;border-radius:99px;font-family:inherit;font-size:.9rem;font-weight:700;transition:all .2s}
.btn:hover{background:#00e0c5;transform:translateY(-1px)}
.back{display:block;margin-top:1rem;font-size:.85rem;color:var(--muted);text-decoration:none}
.back:hover{color:var(--teal)}
</style>
</head>
<body>
<div class="wrap">
  <div class="num">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or may have been moved.</p>
  <a href="/" class="btn">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Go to Homepage
  </a>
  <a href="javascript:history.back()" class="back">← Go back</a>
</div>
</body>
</html>
